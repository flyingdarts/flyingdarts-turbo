  flyingdarts_frontend_flutter_shared_configuration:
    path: ./../shared/configuration/flyingdarts_frontend_flutter_shared_configuration
  flyingdarts_frontend_flutter_shared_configuration_preferences:
    path: ./../shared/configuration/flyingdarts_frontend_flutter_shared_configuration_preferences
  flyingdarts_frontend_flutter_shared_configuration_secrets:
    path: ./../shared/configuration/flyingdarts_frontend_flutter_shared_configuration_secrets
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

  injectable_generator: ^2.3.0
  build_runner: ^2.4.6

