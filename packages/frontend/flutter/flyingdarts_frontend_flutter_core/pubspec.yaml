name: flyingdarts_frontend_flutter_core
description: "A flutter package used to configure dependencies and modules"
version: 0.0.1
publish_to: none

environment:
  sdk: ">=3.1.3 <4.0.0"
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter

  dio: ^4.0.6
  dio_smart_retry: ^1.4.0
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.0.15
