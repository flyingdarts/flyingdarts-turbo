name: flyingdarts_frontend_flutter_features_speech
description: "A package containg the speech feature."
version: 0.0.1
publish_to: none

environment:
  sdk: ">=3.1.3 <4.0.0"
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_bloc: ^8.1.3
  get_it: ^7.6.4

  flyingdarts_frontend_flutter_shared_ui:
    path: ../../shared/flyingdarts_frontend_flutter_shared_ui

  flyingdarts_frontend_flutter_features_language:
    path: ../flyingdarts_frontend_flutter_features_language

