# State Machine Definition for Turbo Setup Workflow
# This YAML can be used to generate code for state machines
# Schema: workflow-schema.json

workflow:
  name: "TurboSetupWorkflow"
  description: "Workflow for setting up and configuring Turbo in a monorepo project"
  version: "1.0.0"

  # Domain Events that can be triggered
  events:
    - name: "start"
      description: "Start the workflow process"
    - name: "continue"
      description: "Continue to the next step"
    - name: "RequirementsVerified"
      description: "Turbo requirements have been verified"
    - name: "PackageInstalled"
      description: "Turbo package has been installed"
    - name: "ConfigVerified"
      description: "Turbo configuration has been verified"
    - name: "WorkspaceAnalyzed"
      description: "Workspace structure has been analyzed"
    - name: "TasksConfigured"
      description: "Turbo tasks have been configured"
    - name: "SetupCompleted"
      description: "Setup process has been completed"
    - name: "UserPrompted"
      description: "User has been prompted for input"
    - name: "ErrorOccurred"
      description: "An error occurred during the process"

  # States of the workflow
  states:
    - id: "initial"
      name: "Initial"
      description: "Starting state of the workflow"
      isInitial: true
      transitions:
        - event: "start"
          target: "verifying-requirements"
          description: "Begin the setup process"

    - id: "verifying-requirements"
      name: "VerifyingRequirements"
      description: "Checking if Turbo is installed and requirements are met"
      actions:
        - type: "log"
          level: "info"
          message: "🚀 Setting up Turbo in $pwd"
        - type: "log"
          level: "info"
          message: "🔄 Checking Turbo requirements"
        - type: "verify-turbo-installation"
        - type: "verify-node-version"
      transitions:
        - event: "RequirementsVerified"
          target: "requirements-met"
          condition: "turbo_installed"
        - event: "RequirementsVerified"
          target: "installing-package"
          condition: "turbo_not_found"
        - event: "ErrorOccurred"
          target: "error"
          description: "Failed to verify requirements"

    - id: "requirements-met"
      name: "RequirementsMet"
      description: "Turbo requirements are satisfied"
      actions:
        - type: "log"
          level: "success"
          message: "✅ Turbo requirements verified"
      transitions:
        - event: "continue"
          target: "analyzing-workspace"
          description: "Proceed to analyze workspace structure"

    - id: "installing-package"
      name: "InstallingPackage"
      description: "Installing or updating Turbo package"
      actions:
        - type: "log"
          level: "info"
          message: "💡 Installing/upgrading Turbo package"
        - type: "install-turbo-package"
      transitions:
        - event: "PackageInstalled"
          target: "analyzing-workspace"
          description: "Package installed successfully"
        - event: "UserPrompted"
          target: "user-prompt"
          description: "User needs to make a decision"
        - event: "ErrorOccurred"
          target: "error"
          description: "Failed to install package"

    - id: "user-prompt"
      name: "UserPrompt"
      description: "Waiting for user input"
      actions:
        - type: "log"
          level: "warning"
          message: "⚠️ New version of Turbo is available. Do you want to upgrade to the latest version? (y/N):"
        - type: "prompt-user"
          question: "upgrade_turbo"
      transitions:
        - event: "UserPrompted"
          target: "installing-package"
          condition: "user_agreed"
        - event: "UserPrompted"
          target: "analyzing-workspace"
          condition: "user_declined"

    - id: "analyzing-workspace"
      name: "AnalyzingWorkspace"
      description: "Analyzing workspace structure and package.json files"
      actions:
        - type: "log"
          level: "info"
          message: "🔍 Analyzing workspace structure"
        - type: "analyze-workspace-structure"
        - type: "detect-package-manager"
      transitions:
        - event: "WorkspaceAnalyzed"
          target: "checking-config"
          description: "Workspace analysis complete"
        - event: "ErrorOccurred"
          target: "error"
          description: "Failed to analyze workspace"

    - id: "checking-config"
      name: "CheckingConfig"
      description: "Checking existing Turbo configuration"
      actions:
        - type: "log"
          level: "info"
          message: "📋 Checking Turbo configuration"
        - type: "verify-turbo-config"
      transitions:
        - event: "ConfigVerified"
          target: "config-valid"
          condition: "config_exists_and_valid"
        - event: "ConfigVerified"
          target: "configuring-tasks"
          condition: "config_missing_or_invalid"
        - event: "ErrorOccurred"
          target: "error"
          description: "Failed to verify configuration"

    - id: "config-valid"
      name: "ConfigValid"
      description: "Turbo configuration is valid and up to date"
      actions:
        - type: "log"
          level: "success"
          message: "✅ Turbo configuration is valid"
      transitions:
        - event: "continue"
          target: "setup-complete"
          description: "Proceed to completion"

    - id: "configuring-tasks"
      name: "ConfiguringTasks"
      description: "Configuring Turbo tasks and pipeline"
      actions:
        - type: "log"
          level: "info"
          message: "⚙️ Configuring Turbo tasks"
        - type: "configure-turbo-tasks"
        - type: "setup-caching"
        - type: "configure-dependencies"
      transitions:
        - event: "TasksConfigured"
          target: "setup-complete"
          description: "Tasks configured successfully"
        - event: "UserPrompted"
          target: "custom-config-prompt"
          description: "User needs to customize configuration"
        - event: "ErrorOccurred"
          target: "error"
          description: "Failed to configure tasks"

    - id: "custom-config-prompt"
      name: "CustomConfigPrompt"
      description: "Prompting user for custom configuration options"
      actions:
        - type: "log"
          level: "info"
          message: "🎛️ Customize Turbo configuration options"
        - type: "prompt-custom-config"
      transitions:
        - event: "UserPrompted"
          target: "configuring-tasks"
          condition: "user_provided_config"
        - event: "UserPrompted"
          target: "setup-complete"
          condition: "user_skipped_config"

    - id: "setup-complete"
      name: "SetupComplete"
      description: "Turbo setup has been completed successfully"
      isFinal: true
      actions:
        - type: "log"
          level: "success"
          message: "✅ Turbo setup completed successfully! 🎉"
        - type: "log"
          level: "info"
          message: "🚀 You can now use 'turbo run <task>' to execute tasks across your monorepo"
        - type: "display-usage-examples"

    - id: "error"
      name: "Error"
      description: "An error occurred during the setup process"
      isFinal: true
      actions:
        - type: "log"
          level: "error"
          message: "❌ Turbo setup failed. Please check the error messages above."
        - type: "log"
          level: "info"
          message: "💡 Try running 'turbo --version' to check your installation"

  # Configuration for code generation
  codeGeneration:
    language: "csharp"
    namespace: "Flyingdarts.Workflows.Turbo"
    baseClass: "StateMachineBase"
    generateInterfaces: true
    generateTests: true

    # Custom actions that need implementation
    customActions:
      - name: "verify-turbo-installation"
        description: "Check if Turbo is installed globally or locally"
        returnType: "bool"

      - name: "verify-node-version"
        description: "Check if Node.js version is compatible with Turbo"
        returnType: "bool"

      - name: "install-turbo-package"
        description: "Install or update Turbo package"
        returnType: "bool"

      - name: "analyze-workspace-structure"
        description: "Analyze the workspace structure and detect packages"
        returnType: "WorkspaceAnalysis"

      - name: "detect-package-manager"
        description: "Detect the package manager being used (npm, yarn, pnpm)"
        returnType: "string"

      - name: "verify-turbo-config"
        description: "Verify that turbo.json exists and is valid"
        returnType: "ConfigValidationResult"

      - name: "configure-turbo-tasks"
        description: "Configure Turbo tasks based on workspace analysis"
        returnType: "bool"

      - name: "setup-caching"
        description: "Configure Turbo caching settings"
        returnType: "bool"

      - name: "configure-dependencies"
        description: "Configure task dependencies and pipeline"
        returnType: "bool"

      - name: "prompt-custom-config"
        description: "Prompt user for custom configuration options"
        returnType: "CustomConfig"

      - name: "display-usage-examples"
        description: "Display usage examples and next steps"
        returnType: "void"

      - name: "prompt-user"
        description: "Prompt user for input and wait for response"
        parameters:
          - name: "question"
            type: "string"
        returnType: "string"

  # Validation rules
  validation:
    - rule: "all-states-must-have-transitions"
      description: "Every state must have at least one transition (except final states)"
    - rule: "initial-state-required"
      description: "Exactly one state must be marked as initial"
    - rule: "final-states-required"
      description: "At least one state must be marked as final"
    - rule: "unique-state-ids"
      description: "All state IDs must be unique"
    - rule: "valid-transition-targets"
      description: "All transition targets must reference existing states" 