name: Validate Workflow YAML

on:
  push:
    paths:
      - "scripts/beachball/**/*.yml"
      - "scripts/beachball/**/*.yaml"
      - "scripts/beachball/**/*.json"
      - "scripts/beachball/**/*.py"
      - "scripts/beachball/**/*.sh"
  pull_request:
    paths:
      - "scripts/beachball/**/*.yml"
      - "scripts/beachball/**/*.yaml"
      - "scripts/beachball/**/*.json"
      - "scripts/beachball/**/*.py"
      - "scripts/beachball/**/*.sh"

  workflow_dispatch:
    inputs:
      workflow_file:
        description: "Path to workflow YAML file to validate"
        required: false
        default: "scripts/beachball/states.yml"
        type: string

jobs:
  validate-workflow:
    name: Validate Workflow YAML
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('scripts/beachball/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          cd scripts/beachball
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Make validation script executable
        run: |
          cd scripts/beachball
          chmod +x validate.sh

      - name: Validate workflow files
        run: |
          cd scripts/beachball

          # If workflow_dispatch with custom file, validate that
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.workflow_file }}" ]; then
            echo "🔍 Validating custom workflow file: ${{ github.event.inputs.workflow_file }}"
            ./validate.sh "${{ github.event.inputs.workflow_file }}"
          else
            # Validate all YAML files in the beachball directory
            echo "🔍 Finding and validating workflow YAML files..."
            
            # Find all YAML files (excluding the workflow schema itself)
            find . -name "*.yml" -o -name "*.yaml" | grep -v "workflow-schema.json" | while read -r file; do
              if [ -f "$file" ]; then
                echo "📋 Validating: $file"
                if ./validate.sh "$file"; then
                  echo "✅ $file is valid"
                else
                  echo "❌ $file validation failed"
                  exit 1
                fi
              fi
            done
            
            # Also validate the default states.yml if it exists
            if [ -f "states.yml" ]; then
              echo "📋 Validating default states.yml"
              ./validate.sh states.yml
            fi
          fi

      - name: Upload validation artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: validation-failure-logs
          path: |
            scripts/beachball/*.log
            scripts/beachball/validation-*.txt
          retention-days: 7

      - name: Comment on PR (on failure)
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo
            });

            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('❌ Workflow validation failed')
            );

            const commentBody = `❌ **Workflow validation failed**

            The workflow YAML files in this PR failed validation. Please check the [validation logs](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.

            Common issues:
            - Missing required fields (name, description, version, events, states)
            - Invalid state transitions (targeting non-existent states)
            - Undefined events referenced in transitions
            - Missing initial or final states
            - Duplicate state IDs

            To validate locally, run:
            \`\`\`bash
            cd scripts/beachball
            ./validate.sh
            \`\`\``;

            if (botComment) {
              await github.rest.issues.updateComment({
                comment_id: botComment.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: commentBody
              });
            }
